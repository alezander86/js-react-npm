name: Notify Microsoft Teams on PR

on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Microsoft Teams
        uses: Skitionek/notify-microsoft-teams@v1.0.8
        with:
          webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
          raw: > { "@type": "MessageCard", "@context": "http://schema.org/extensions", "themeColor": "0076D7", "summary": "new Pull Request", "sections": [{ "activityTitle": "Новый Pull Request", "activitySubtitle": "Пожалуйста, ознакомьтесь с PR.", "markdown": true }], "potentialAction": [{ "@type": "OpenUri", "name": "PR", "targets": [ { "os": "default", "uri": "${{ github.event.pull_request.html_url }}" } ] }] }